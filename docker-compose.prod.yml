name: yappie-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: yappie-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yappie-prod-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: yappie-prod-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      # Server
      NODE_ENV: production
      PORT: 3001
      # Database (host overridden for compose network)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # Redis (overridden for compose network)
      REDIS_URL: redis://redis:6379
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_TRANSCRIPTION_MODEL: ${AI_TRANSCRIPTION_MODEL:-whisper-1}
      AI_DECOMPOSITION_MODEL: ${AI_DECOMPOSITION_MODEL:-gpt-4o}
      AI_GENERATION_MODEL: ${AI_GENERATION_MODEL:-gpt-4o}
      # Storage
      UPLOAD_PATH: /app/uploads
      # Frontend URLs
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Quotas
      QUOTA_FREE_MINUTES: ${QUOTA_FREE_MINUTES:-60}
      QUOTA_PRO_MINUTES: ${QUOTA_PRO_MINUTES:-600}
      # Sentry (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
